name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  main:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install worker dependencies
        run: npm ci --prefix worker
      - name: Build worker corpus
        run: npm run build:worker-corpus
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Evaluate retrieval quality
        run: npm run eval
